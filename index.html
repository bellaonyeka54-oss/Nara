<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nara</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0b1220;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 15px;
    }

    .app {
      width: 100%;
      max-width: 500px;
      background: #111827;
      border-radius: 14px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 5px;
    }

    .chat {
      background: #0f172a;
      border-radius: 10px;
      padding: 12px;
      height: 320px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      padding: 10px 12px;
      border-radius: 10px;
      max-width: 80%;
      font-size: 14px;
      line-height: 1.4;
    }

    .user {
      background: #2563eb;
      align-self: flex-end;
    }

    .nara {
      background: #1f2937;
      align-self: flex-start;
    }

    .input-area {
      display: flex;
      gap: 8px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px 14px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      cursor: pointer;
      font-weight: bold;
    }

    @media (max-width: 400px) {
      .msg {
        max-width: 90%;
      }
    }
  </style>
</head>

<body>

<div class="app">
  <h1>Nara</h1>

  <div class="chat" id="chat">
    <div class="msg nara">
      Hello, I’m Nara. Describe your symptoms and I’ll guide you.
    </div>
  </div>

  <div class="input-area">
    <input id="input" placeholder="Type here...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");
  const text = input.value.trim();

  if (!text) return;

  chat.innerHTML += `<div class="msg user">${text}</div>`;

  let response = "";

  if (text.toLowerCase().includes("bleeding") || text.toLowerCase().includes("pain") || text.toLowerCase().includes("discharge")) {
    response = "⚠️ Moderate Risk\nYou should visit a clinic for screening. Early detection is important.";
  } else {
    response = "✅ Low Risk\nMonitor your symptoms and consider routine screening.";
  }

  setTimeout(() => {
    chat.innerHTML += `<div class="msg nara">${response}</div>`;
    chat.scrollTop = chat.scrollHeight;
  }, 500);

  input.value = "";
}
</script>

</body>
</html>
